name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - master

jobs:
  sonarqube-analysis:
    name: SonarQube Scan
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # ── Actualizado a Node 20 para evitar el warning EBADENGINE ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Backend dependencies
        working-directory: ./Back
        run: npm ci

# ── 4. Ejecutar SonarQube Scanner en Windows ────────────────
      - name: SonarQube Scan
        env:
          SONAR_HOST_URL: "http://localhost:9000"
          # Pasamos el token de forma nativa para evadir el bug de npm
          SONAR_SCANNER_OPTS: "-Dsonar.login=${{ secrets.SONAR_TOKEN }}"
        # Ejecutamos el comando limpio sin argumentos extras
        run: npx sonarqube-scanner