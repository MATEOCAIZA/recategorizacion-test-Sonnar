name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - master

jobs:
  sonarqube-analysis:
    name: SonarQube Scan
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # ── Actualizado a Node 20 para evitar el warning EBADENGINE ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Backend dependencies
        working-directory: ./Back
        run: npm ci

      # ── Pasamos el token explícitamente con -Dsonar.login ────────
      - name: SonarQube Scan
        env:
          SONAR_HOST_URL: "http://localhost:9000"
        run: npx sonarqube-scanner -Dsonar.login="${{ secrets.SONAR_TOKEN }}"