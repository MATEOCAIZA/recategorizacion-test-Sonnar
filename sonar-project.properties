# ===================================================================
#  SonarQube – Configuración del proyecto
# ===================================================================

# Identificador único del proyecto en SonarQube
sonar.projectKey=recategorizacion-test-Sonnar
sonar.projectName=Recategorización Test Sonnar

# Versión del proyecto
sonar.projectVersion=1.0

# ── Directorios de código fuente ──────────────────────────────────
# Incluye tanto el backend (Node.js) como el frontend (React)
sonar.sources=Back/src,Front/src

# ── Exclusiones ───────────────────────────────────────────────────
# Archivos y carpetas que NO deben analizarse
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/public/**,\
  **/coverage/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/*.test.jsx,\
  **/*.spec.jsx,\
  **/DB/**,\
  **/*.sql,\
  **/*.rar

# ── Lenguaje y codificación ──────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Cobertura de tests (opcional, si se genera) ──────────────────
# sonar.javascript.lcov.reportPaths=Front/coverage/lcov.info,Back/coverage/lcov.info
