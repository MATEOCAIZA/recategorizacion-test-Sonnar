name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - master

jobs:
  sonarqube-analysis:
    name: SonarQube Scan
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # ── Actualizado a Node 20 para evitar el warning EBADENGINE ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Backend dependencies
        working-directory: ./Back
        run: npm ci

      - name: Validar token contra SonarQube
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $response = curl.exe -s -u "$($env:SONAR_TOKEN):" http://localhost:9000/api/authentication/validate
          Write-Host $response

      - name: SonarQube Scan
        env:
          SONAR_HOST_URL: "http://localhost:9000"
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: npx sonarqube-scanner